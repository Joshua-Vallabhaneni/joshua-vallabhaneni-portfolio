      - generic [ref=e40]:
        - paragraph [ref=e41]: "Most academic planning tools treat a degree as a checklist. EduPlanner treats it as a graph: courses, prerequisites, career interests, extracurriculars, and required experiences are all nodes, and the planner finds a path through them that satisfies the user's constraints and signals their direction."
        - paragraph [ref=e42]: Under the hood, the system uses OpenRouter to route prompts to whichever model is cheapest for the planning step at hand — fast cheap models for slot-filling, larger models for the harder reasoning steps. This kept inference cost low enough to support a free tier while the user base grew.
        - paragraph [ref=e43]: "Over 1,300 students use EduPlanner to manage their plans. The interesting design problem turned out to be the change flow: when a student decides to switch majors or add a research interest in their junior year, the planner has to re-plan against work they have already done without throwing away credits. Most of the engineering time went into making that flow feel calm rather than punishing."
