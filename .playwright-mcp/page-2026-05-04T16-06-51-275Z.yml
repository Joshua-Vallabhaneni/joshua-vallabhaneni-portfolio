      - generic [ref=e47]:
        - paragraph [ref=e48]: Network engineers and platform teams want different ergonomics for the same job. Engineers want a CLI that reads like the real switch console; platform teams want a REST API they can wire into automation. The hardest part is making sure those two surfaces never drift — that the CLI and the API genuinely run the same backend and produce the same effects.
        - paragraph [ref=e49]: SwitchConfigSim is structured around a single Go core that exposes both a Cobra-style CLI and a generated OpenAPI server. Every state-changing operation routes through the same automation script, so adding a new command means writing it once and getting both surfaces for free. The OpenAPI spec is the contract; the CLI is generated from the same handlers the API exposes.
        - paragraph [ref=e50]: "The simulator runs against virtualized switch images on Linux, which means the same workflow that drives the test harness can be pointed at a real device with no code change. That is the part that makes this useful inside a large org: it collapses the gap between a learning environment and a production runbook."
      - img "SwitchConfigSim CLI and REST API panels side by side, both calling the same Go backend handlers." [ref=e54]
