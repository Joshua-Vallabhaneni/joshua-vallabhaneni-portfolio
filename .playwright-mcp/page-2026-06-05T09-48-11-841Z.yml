          - generic [ref=e21]: CodeShot
        - paragraph [ref=e22]: A system that converts design mockups into production-ready code by combining computer vision, reinforcement learning, and agent-based reasoning to explore code variants and evaluate them via a custom similarity metric.
        - generic [ref=e23]:
